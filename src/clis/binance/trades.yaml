site: binance
name: trades
description: Recent trades for a trading pair
domain: data-api.binance.vision
strategy: public
browser: false

args:
  symbol:
    type: str
    required: true
    positional: true
    description: "Trading pair symbol (e.g. BTCUSDT, ETHUSDT)"
  limit:
    type: int
    default: 20
    description: Number of trades (max 1000)

pipeline:
  - fetch:
      url: https://data-api.binance.vision/api/v3/trades?symbol=${{ args.symbol }}&limit=${{ args.limit }}

  - map:
      id: ${{ item.id }}
      price: ${{ item.price }}
      qty: ${{ item.qty }}
      quote_qty: ${{ item.quoteQty }}
      buyer_maker: ${{ item.isBuyerMaker }}

  - limit: ${{ args.limit }}

columns: [id, price, qty, quote_qty, buyer_maker]
