site: binance
name: prices
description: Latest prices for all trading pairs
domain: data-api.binance.vision
strategy: public
browser: false

args:
  limit:
    type: int
    default: 20
    description: Number of prices

pipeline:
  - fetch:
      url: https://data-api.binance.vision/api/v3/ticker/price

  - map:
      rank: ${{ index + 1 }}
      symbol: ${{ item.symbol }}
      price: ${{ item.price }}

  - limit: ${{ args.limit }}

columns: [rank, symbol, price]
